<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FAFAFA" />
  <title>You're Offline — Ken's Blog</title>
  <script>
    (function() {
      var theme = null;
      try {
        theme = localStorage.getItem('theme');
      } catch (e) {
        theme = null;
      }
      if (!theme) {
        theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.content = '#09090B';
      }
    })();
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-background: #FAFAFA;
      --color-foreground: #111827;
      --color-foreground-secondary: #374151;
      --color-button-bg: #2563EB;
      --color-button-hover: #1d4ed8;
      --color-button-active: #1e40af;
    }

    .dark {
      --color-background: #09090B;
      --color-foreground: #FAFAFA;
      --color-foreground-secondary: #E4E4E7;
      --color-button-bg: #3B82F6;
      --color-button-hover: #2563EB;
      --color-button-active: #1d4ed8;
    }

    body {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--color-background);
      color: var(--color-foreground);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }

    h1 {
      font-family: 'Barlow Condensed', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 1.125rem;
      line-height: 1.6;
      max-width: 28rem;
      margin-bottom: 2rem;
      color: var(--color-foreground-secondary);
    }

    button {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: #FAFAFA;
      background-color: var(--color-button-bg);
      border: none;
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    button:hover {
      background-color: var(--color-button-hover);
    }

    button:active {
      background-color: var(--color-button-active);
    }
  </style>
</head>
<body>
  <h1>You're Offline</h1>
  <p>It looks like you've lost your internet connection. Some previously visited pages may still be available.</p>
  <button onclick="location.reload()">Try Again</button>
</body>
</html>
